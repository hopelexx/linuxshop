<style>
:root{--black:#0a0a0a;--dark:#111111;--card:#161616;--border:#2a2a2a;--orange:#ff6600;--orange-dim:rgba(255,102,0,0.15);--white:#f0f0f0;--gray:#888;--red:#ff3333;--green:#33ff66;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:'Space Mono',monospace;min-height:100vh}

/* LOGIN PAGE */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(255,102,0,0.06) 0%,transparent 70%)}
.login-box{background:var(--dark);border:1px solid var(--border);padding:48px;width:100%;max-width:420px;text-align:center}
.login-tux{font-size:64px;display:block;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(255,102,0,0.5))}
.login-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;margin-bottom:8px}
.login-title span{color:var(--orange)}
.login-sub{color:var(--gray);font-size:11px;letter-spacing:0.2em;margin-bottom:32px}
.login-input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--white);padding:16px;font-family:'Space Mono',monospace;font-size:14px;outline:none;transition:border-color 0.2s;text-align:center;letter-spacing:0.2em;margin-bottom:12px}
.login-input:focus{border-color:var(--orange)}
.login-btn{width:100%;background:var(--orange);color:#000;border:none;padding:16px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.1em;clip-path:polygon(10px 0,100% 0,calc(100%-10px) 100%,0 100%);transition:background 0.2s;margin-bottom:12px}
.login-btn:hover{background:#ff8833}
.login-error{color:var(--red);font-size:12px;display:none;margin-bottom:8px}
.login-hint{color:var(--border);font-size:11px}
.back-link{display:inline-block;margin-top:16px;color:var(--gray);font-size:11px;text-decoration:none;transition:color 0.2s}
.back-link:hover{color:var(--orange)}

/* ADMIN DASHBOARD */
#dashboard{display:none;min-height:100vh}
.admin-nav{background:var(--dark);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-brand{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;display:flex;align-items:center;gap:10px}
.admin-brand span{color:var(--orange)}
.admin-nav-right{display:flex;align-items:center;gap:16px}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--gray);padding:8px 16px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.firebase-status{font-size:11px;color:var(--gray)}
.firebase-status.ok{color:var(--green)}

/* TABS */
.admin-tabs{background:var(--dark);border-bottom:1px solid var(--border);padding:0 32px;display:flex;gap:0}
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--gray);padding:16px 24px;font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.2s;letter-spacing:0.05em}
.tab-btn:hover{color:var(--white)}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}

/* CONTENT */
.admin-body{padding:32px}
.section-title{font-family:'Orbitron',monospace;font-size:11px;color:var(--orange);letter-spacing:0.2em;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--card);border:1px solid var(--border);padding:24px;text-align:center}
.stat-num{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;display:block;margin-bottom:8px}
.stat-lbl{font-size:11px;color:var(--gray);letter-spacing:0.1em}

/* TABLE */
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{background:var(--card);border:1px solid var(--border);padding:10px 14px;text-align:left;font-size:11px;color:var(--orange);letter-spacing:0.1em;font-weight:400}
.admin-table td{border:1px solid var(--border);padding:10px 14px;vertical-align:middle}
.admin-table tr:hover td{background:rgba(255,102,0,0.03)}

/* BADGES */
.badge{padding:3px 8px;font-size:10px;font-weight:700;letter-spacing:0.1em}
.badge-hit{background:var(--orange);color:#000}
.badge-new{background:var(--green);color:#000}
.badge-sale{background:var(--red);color:#fff}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--white);padding:12px 14px;font-family:'Space Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--orange)}
.btn-orange{background:var(--orange);color:#000;border:none;padding:10px 20px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;font-weight:700}
.btn-gray{background:transparent;color:var(--gray);border:1px solid var(--border);padding:10px 16px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer}
.btn-small{padding:4px 8px;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;border:1px solid;transition:all 0.2s}

/* ADD FORM BOX */
.add-form-box{background:var(--card);border:1px solid var(--orange);padding:24px;margin-bottom:20px;display:none}

/* ORDERS */
.order-card{background:var(--card);border:1px solid var(--border);padding:20px;margin-bottom:12px}
.order-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.order-num{font-family:'Orbitron',monospace;font-size:14px;color:var(--orange)}
.order-total{font-family:'Orbitron',monospace;font-size:16px;font-weight:900}
.order-date{font-size:11px;color:var(--gray)}
.order-detail{font-size:12px;color:var(--gray);line-height:1.8}
.order-status{display:inline-block;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:0.1em;background:rgba(255,102,0,0.2);color:var(--orange);border:1px solid rgba(255,102,0,0.4)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--orange);color:var(--white);padding:12px 24px;font-family:'Space Mono',monospace;font-size:12px;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-box{text-align:center;padding:60px;color:var(--gray)}
.empty-box .icon{font-size:48px;display:block;margin-bottom:16px}
</style>

// вФАвФА AUTH вФАвФА
function login() {
  var p = document.getElementById('passInput').value;
  var err = document.getElementById('loginError');
  if (p === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    initAdmin();
  } else {
    err.style.display = 'block';
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
  }
}
function logout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

// вФАвФА INIT вФАвФА
async function initAdmin() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    document.getElementById('fbStatus').textContent = 'вЬЕ Firebase –њ—Ц–і–Ї–ї—О—З–µ–љ–Њ';
    document.getElementById('fbStatus').className = 'firebase-status ok';
  } catch(e) {
    document.getElementById('fbStatus').textContent = 'вЪ†пЄП –Ф–µ–Љ–Њ —А–µ–ґ–Є–Љ';
  }
  await loadProducts();
  renderTab('overview');
}

async function loadProducts() {
  if (db) {
    try {
      var snap = await db.collection('products').get();
      PRODUCTS = snap.empty ? DEMO_PRODUCTS.map(p=>({...p})) : snap.docs.map(d=>({firestoreId:d.id,...d.data()}));
    } catch(e) { PRODUCTS = DEMO_PRODUCTS.map(p=>({...p})); }
  } else { PRODUCTS = DEMO_PRODUCTS.map(p=>({...p})); }
}

  renderTab(tab);
}

      '<table class="admin-table"><thead><tr><th>–Ъ–Р–Ґ–Х–У–Ю–†–Ж–ѓ</th><th>–Ъ-–Ґ–ђ</th><th>–Ь–Ж–Э. –¶–Ж–Э–Р</th><th>–Ь–Р–Ъ–°. –¶–Ж–Э–Р</th><th>–°–Х–†–Х–Ф–Э–ѓ</th></tr></thead><tbody>'+
      ['clothes','gadgets','dishes','accessories','stationery','lifestyle'].map(function(cat){
        var ps = PRODUCTS.filter(p=>p.cat===cat);
        if (!ps.length) return '<tr><td>'+catLabel(cat)+'</td><td>0</td><td>вАФ</td><td>вАФ</td><td>вАФ</td></tr>';
        var prices = ps.map(p=>p.price);
        var avg = Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
        return '<tr><td>'+catLabel(cat)+'</td><td style="color:var(--orange)">'+ps.length+'</td><td>'+Math.min(...prices)+' вВі</td><td>'+Math.max(...prices)+' вВі</td><td>'+avg+' вВі</td></tr>';
      }).join('')+
      '</tbody></table>';
  }
  else if (tab === 'products') {
    c.innerHTML =
      '<div class="section-title">// –£–Я–†–Р–Т–Ы–Ж–Э–Э–ѓ –Ґ–Ю–Т–Р–†–Р–Ь–Ш ('+PRODUCTS.length+' –њ–Њ–Ј–Є—Ж—Ц–є)</div>'+
      '<div style="margin-bottom:16px"><button class="btn-orange" onclick="document.getElementById(\'addForm\').style.display=\'block\'">+ –Ф–Ю–Ф–Р–Ґ–Ш –Ґ–Ю–Т–Р–†</button></div>'+
      '<div class="add-form-box" id="addForm">'+
        '<div class="section-title">// –Э–Ю–Т–Ш–Щ –Ґ–Ю–Т–Р–†</div>'+
        '<div class="form-grid">'+
          '<input class="form-input" id="np-name" placeholder="–Э–∞–Ј–≤–∞ *">'+
          '<input class="form-input" id="np-price" type="number" placeholder="–¶—Ц–љ–∞ (вВі) *">'+
          '<input class="form-input" id="np-oldprice" type="number" placeholder="–°—В–∞—А–∞ —Ж—Ц–љ–∞ (—П–Ї—Й–Њ –∞–Ї—Ж—Ц—П)">'+
          '<input class="form-input" id="np-emoji" placeholder="–Х–Љ–Њ–і–Ј—Ц (–љ–∞–њ—А. рЯСХ)">'+
          '<select class="form-input" id="np-cat" style="background:var(--card);color:var(--white)">'+
            '<option value="">–Ъ–∞—В–µ–≥–Њ—А—Ц—П *</option>'+
            '<option value="clothes">–Ю–і—П–≥</option><option value="gadgets">–У–∞–і–ґ–µ—В–Є</option>'+
            '<option value="dishes">–Я–Њ—Б—Г–і</option><option value="accessories">–Р–Ї—Б–µ—Б—Г–∞—А–Є</option>'+
            '<option value="stationery">–Ъ–∞–љ—Ж–µ–ї—П—А—Ц—П</option><option value="lifestyle">–Ы–∞–є—Д—Б—В–∞–є–ї</option>'+
          '</select>'+
          '<select class="form-input" id="np-badge" style="background:var(--card);color:var(--white)">'+
            '<option value="">–С–µ–Ј –Ј–љ–∞—З–Ї–∞</option><option value="hit">–•–Ж–Ґ</option><option value="new">NEW</option><option value="sale">–Р–Ъ–¶–Ж–ѓ</option>'+
          '</select>'+
        '</div>'+
        '<input class="form-input" id="np-desc" placeholder="–Ю–њ–Є—Б —В–Њ–≤–∞—А—Г" style="width:100%;margin-bottom:12px">'+
        '<div style="display:flex;gap:8px">'+
          '<button class="btn-orange" onclick="saveNewProduct()">–Ч–С–Х–†–Х–У–Ґ–Ш вЖТ</button>'+
          '<button class="btn-gray" onclick="document.getElementById(\'addForm\').style.display=\'none\'">–°–Ъ–Р–°–£–Т–Р–Ґ–Ш</button>'+
        '</div>'+
      '</div>'+
      '<table class="admin-table"><thead><tr><th>#</th><th>–Ґ–Ю–Т–Р–†</th><th>–Ъ–Р–Ґ.</th><th>–¶–Ж–Э–Р</th><th>–Ч–Э–Р–І–Ю–Ъ</th><th>–Ф–Ж–З</th></tr></thead><tbody>'+
      PRODUCTS.map(function(p){
        var pid = p.firestoreId||p.id;
        return '<tr id="row-'+pid+'"><td style="color:var(--gray);font-size:10px">'+String(pid).slice(-6)+'</td>'+
          '<td>'+p.emoji+' '+p.name+'</td><td>'+catLabel(p.cat)+'</td>'+
          '<td><span id="pl-'+pid+'" style="color:var(--orange);font-family:Orbitron,monospace">'+p.price+' вВі</span>'+
            '<input id="pi-'+pid+'" type="number" style="display:none;width:80px;background:var(--card);border:1px solid var(--orange);color:#fff;padding:4px;font-family:Orbitron,monospace" value="'+p.price+'"></td>'+
          '<td>'+(p.badge?'<span class="badge badge-'+p.badge+'">'+(p.badge==='hit'?'–•–Ж–Ґ':p.badge==='new'?'NEW':'–Р–Ъ–¶–Ж–ѓ')+'</span>':'вАФ')+'</td>'+
          '<td style="display:flex;gap:4px;flex-wrap:wrap">'+
            '<button class="btn-small" id="eb-'+pid+'" style="border-color:var(--orange);color:var(--orange)" onclick="editPrice(\''+pid+'\')">вЬПпЄП</button>'+
            '<button class="btn-small" id="sb-'+pid+'" style="display:none;border-color:var(--green);color:var(--green)" onclick="savePriceEdit(\''+pid+'\')">вЬУ</button>'+
            '<button class="btn-small" style="border-color:var(--border);color:var(--gray)" onclick="toggleBadge(\''+pid+'\')">рЯФД</button>'+
            '<button class="btn-small" style="border-color:var(--red);color:var(--red)" onclick="deleteProduct(\''+pid+'\')">рЯЧС</button>'+
          '</td></tr>';
      }).join('')+'</tbody></table>';
  }
  else if (tab === 'orders') {
    c.innerHTML = '<div class="section-title">// –Ч–Р–Ь–Ю–Т–Ы–Х–Э–Э–ѓ –Ъ–Ы–Ж–Д–Э–Ґ–Ж–Т</div><div id="ordersMsg" style="color:var(--gray);font-size:11px">// –Ч–∞–≤–∞–љ—В–∞–ґ–µ–љ–љ—П...</div><div id="ordersContainer"></div>';
    loadOrders();
  }
  else if (tab === 'sale') {
    var saleP = PRODUCTS.filter(p=>p.badge==='sale');
    c.innerHTML =
      '<div class="section-title">// –Р–Ъ–¶–Ж–Щ–Э–Ж –Ґ–Ю–Т–Р–†–Ш ('+saleP.length+' –њ–Њ–Ј–Є—Ж—Ц–є)</div>'+
      (saleP.length ? '<table class="admin-table"><thead><tr><th>–Ґ–Ю–Т–Р–†</th><th>–°–Ґ–Р–†–Р –¶–Ж–Э–Р</th><th>–Р–Ъ–¶–Ж–Щ–Э–Р –¶–Ж–Э–Р</th><th>–Ч–Э–Ш–Ц–Ъ–Р</th><th>–Ф–Ж–ѓ</th></tr></thead><tbody>'+
        saleP.map(function(p){
          var disc = p.oldPrice ? Math.round((1-p.price/p.oldPrice)*100) : 0;
          var pid = p.firestoreId||p.id;
          return '<tr><td>'+p.emoji+' '+p.name+'</td>'+
            '<td style="text-decoration:line-through;color:var(--gray)">'+(p.oldPrice||p.price)+' вВі</td>'+
            '<td style="color:var(--red);font-family:Orbitron,monospace">'+p.price+' вВі</td>'+
            '<td><span class="badge badge-sale">-'+disc+'%</span></td>'+
            '<td><button class="btn-small" style="border-color:var(--border);color:var(--gray)" onclick="removeFromSale(\''+pid+'\')">–Ч–Э–ѓ–Ґ–Ш –Ч –Р–Ъ–¶–Ж–З</button></td></tr>';
        }).join('')+'</tbody></table>'
      : '<div class="empty-box"><span class="icon">рЯУ≠</span>–Р–Ї—Ж—Ц–є–љ–Є—Е —В–Њ–≤–∞—А—Ц–≤ –љ–µ–Љ–∞—Ф</div>');
  }
}

// вФАвФА PRODUCT CRUD вФАвФА
async function saveNewProduct() {
  var name=document.getElementById('np-name').value.trim();
  var price=parseInt(document.getElementById('np-price').value);
  var cat=document.getElementById('np-cat').value;
  var emoji=document.getElementById('np-emoji').value.trim()||'рЯУ¶';
  var desc=document.getElementById('np-desc').value.trim();
  var badge=document.getElementById('np-badge').value||null;
  var oldPrice=parseInt(document.getElementById('np-oldprice').value)||null;
  if (!name||!price||!cat){showToast('вЭМ –Ч–∞–њ–Њ–≤–љ—Ц—В—М –љ–∞–Ј–≤—Г, —Ж—Ц–љ—Г —В–∞ –Ї–∞—В–µ–≥–Њ—А—Ц—О');return;}
  var np={name,price,cat,emoji,desc,badge,oldPrice,img:null};
  if (db) {
    try { var ref=await db.collection('products').add(np); PRODUCTS.push({firestoreId:ref.id,...np}); showToast('вЬЕ –Ґ–Њ–≤–∞—А –і–Њ–і–∞–љ–Њ –≤ Firebase!'); }
    catch(e){showToast('вЭМ '+e.message);return;}
  } else { np.id=PRODUCTS.length+1; PRODUCTS.push(np); showToast('вЬЕ –Ф–Њ–і–∞–љ–Њ (–і–µ–Љ–Њ)'); }
  document.getElementById('addForm').style.display='none';
  renderTab('products');
}
function editPrice(id) {
  document.getElementById('pl-'+id).style.display='none';
  document.getElementById('pi-'+id).style.display='inline-block';
  document.getElementById('eb-'+id).style.display='none';
  document.getElementById('sb-'+id).style.display='inline-block';
}
async function savePriceEdit(id) {
  var np=parseInt(document.getElementById('pi-'+id).value);
  if (!np||np<1){showToast('вЭМ –Э–µ–Ї–Њ—А–µ–Ї—В–љ–∞ —Ж—Ц–љ–∞');return;}
  var p=PRODUCTS.find(p=>String(p.firestoreId||p.id)===String(id));
  if (!p) return;
  if (db&&p.firestoreId){try{await db.collection('products').doc(id).update({price:np});}catch(e){showToast('вЭМ '+e.message);return;}}
  p.price=np; showToast('вЬЕ –¶—Ц–љ—Г –Њ–љ–Њ–≤–ї–µ–љ–Њ!'); renderTab('products');
}
async function toggleBadge(id) {
  var p=PRODUCTS.find(p=>String(p.firestoreId||p.id)===String(id));
  if (!p) return;
  var badges=[null,'hit','new','sale'];
  var next=badges[(badges.indexOf(p.badge)+1)%badges.length];
  if (db&&p.firestoreId){try{await db.collection('products').doc(id).update({badge:next});}catch(e){showToast('вЭМ '+e.message);return;}}
  p.badge=next; showToast('вЬЕ –Ч–љ–∞—З–Њ–Ї: '+(next||'–±–µ–Ј –Ј–љ–∞—З–Ї–∞')); renderTab('products');
}
async function deleteProduct(id) {
  var p=PRODUCTS.find(p=>String(p.firestoreId||p.id)===String(id));
  if (!p) return;
  if (!confirm('–Т–Є–і–∞–ї–Є—В–Є "'+p.name+'"?')) return;
  if (db&&p.firestoreId){try{await db.collection('products').doc(id).delete();}catch(e){showToast('вЭМ '+e.message);return;}}
  PRODUCTS=PRODUCTS.filter(p=>String(p.firestoreId||p.id)!==String(id));
  showToast('вЬЕ –Т–Є–і–∞–ї–µ–љ–Њ!'); renderTab('products');
}
async function removeFromSale(id) {
  var p=PRODUCTS.find(p=>String(p.firestoreId||p.id)===String(id));
  if (!p) return;
  if (db&&p.firestoreId){try{await db.collection('products').doc(id).update({badge:null,oldPrice:null});}catch(e){showToast('вЭМ '+e.message);return;}}
  p.badge=null; p.oldPrice=null; showToast('вЬЕ –Ч–љ—П—В–Њ –Ј –∞–Ї—Ж—Ц—Ч'); renderTab('sale');
}

// вФАвФА ORDERS вФАвФА
async function loadOrders() {
  var msg=document.getElementById('ordersMsg');
  var cont=document.getElementById('ordersContainer');
  if (!db){msg.textContent='// Firebase –љ–µ –њ—Ц–і–Ї–ї—О—З–µ–љ–Њ';return;}
  try {
    var snap=await db.collection('orders').get();
    var orders=snap.docs.map(d=>({id:d.id,...d.data()})).reverse();
    msg.textContent='// –Ч–љ–∞–є–і–µ–љ–Њ '+orders.length+' –Ј–∞–Љ–Њ–≤–ї–µ–љ—М';
    cont.innerHTML=orders.length?orders.map(function(o){
      return '<div class="order-card"><div class="order-head">'+
        '<span class="order-num">вДЦ '+o.id.slice(-6).toUpperCase()+'</span>'+
        '<span class="order-date">'+o.date+'</span>'+
        '<span class="order-status">'+o.status+'</span>'+
        '<span class="order-total">'+o.total+' вВі</span>'+
        '</div><div class="order-detail">'+
        'рЯС§ '+o.name+' | рЯУ± '+o.phone+'<br>рЯУН '+o.address+'<br>рЯЫТ '+o.items+
        '</div></div>';
    }).join(''):'<div class="empty-box"><span class="icon">рЯУ≠</span>–Ч–∞–Љ–Њ–≤–ї–µ–љ—М –њ–Њ–Ї–Є –љ–µ–Љ–∞—Ф</div>';
  } catch(e){ msg.textContent='// –Я–Њ–Љ–Є–ї–Ї–∞: '+e.message; }
}

// вФАвФА UTILS вФАвФА
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}

// вФАвФА AUTO CHECK SESSION вФАвФА
if (sessionStorage.getItem('admin_auth')==='1') {
  document.getElementById('loginPage').style.display='none';
  document.getElementById('dashboard').style.display='block';
  initAdmin();
}
</script>
