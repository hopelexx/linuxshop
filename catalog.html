<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог — Linux Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0a0a0a; --dark:#111; --card:#161616; --border:#2a2a2a;
  --orange:#ff6600; --orange-glow:#ff8833; --orange-dim:rgba(255,102,0,0.15);
  --white:#f0f0f0; --gray:#888; --light:#ccc; --red:#ff3333; --green:#33ff66;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--white);letter-spacing:0.1em;text-decoration:none;display:flex;align-items:center;gap:10px;}
.nav-logo span{color:var(--orange);}
.nav-links{display:flex;gap:20px;list-style:none;align-items:center;}
.nav-links a{color:var(--gray);text-decoration:none;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;}
.nav-links a:hover{color:var(--white);}
.cart-btn{background:var(--orange-dim);border:1px solid var(--orange);color:var(--orange);padding:10px 20px;font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);}
.cart-btn:hover{background:var(--orange);color:#000;}
.cart-count{background:var(--orange);color:#000;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-left:4px;}

/* LAYOUT */
.page-wrap{display:grid;grid-template-columns:260px 1fr;gap:0;margin-top:64px;min-height:calc(100vh - 64px);}
@media(max-width:768px){.page-wrap{grid-template-columns:1fr;} .sidebar{display:none;}}

/* SIDEBAR */
.sidebar{background:var(--dark);border-right:1px solid var(--border);padding:32px 24px;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;}
.sidebar-title{font-family:'Orbitron',monospace;font-size:13px;color:var(--orange);letter-spacing:0.15em;margin-bottom:20px;}
.filter-group{margin-bottom:28px;}
.filter-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--gray);letter-spacing:0.15em;margin-bottom:12px;display:block;}
.filter-btn{display:block;width:100%;text-align:left;background:transparent;border:1px solid var(--border);color:var(--light);padding:10px 14px;font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.2s;margin-bottom:6px;letter-spacing:0.05em;}
.filter-btn:hover{border-color:var(--orange);color:var(--orange);}
.filter-btn.active{background:var(--orange-dim);border-color:var(--orange);color:var(--orange);}
.price-inputs{display:flex;gap:8px;align-items:center;}
.price-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--white);padding:8px 10px;font-family:'Space Mono',monospace;font-size:12px;outline:none;width:100%;}
.price-input:focus{border-color:var(--orange);}
.apply-btn{display:block;width:100%;background:var(--orange-dim);border:1px solid var(--orange);color:var(--orange);padding:10px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;margin-top:10px;}
.apply-btn:hover{background:var(--orange);color:#000;}

/* MAIN */
.main-content{padding:32px;}
.catalog-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.catalog-title{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;}
.catalog-meta{color:var(--gray);font-family:'Space Mono',monospace;font-size:12px;}
.search-sort{display:flex;gap:12px;flex-wrap:wrap;}
.search-input{background:var(--card);border:1px solid var(--border);color:var(--white);padding:10px 14px;font-family:'Space Mono',monospace;font-size:12px;outline:none;width:240px;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--orange);}
.sort-select{background:var(--card);border:1px solid var(--border);color:var(--white);padding:10px 14px;font-family:'Space Mono',monospace;font-size:12px;outline:none;cursor:pointer;}
.sort-select:focus{border-color:var(--orange);}

/* PRODUCTS */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
.product-card{background:var(--card);border:1px solid var(--border);transition:all 0.25s;position:relative;overflow:hidden;}
.product-card:hover{border-color:var(--orange);transform:translateY(-4px);}
.product-img{width:100%;aspect-ratio:1;background:var(--dark);display:flex;align-items:center;justify-content:center;font-size:80px;border-bottom:1px solid var(--border);}
.product-info{padding:18px;}
.product-badges{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.badge{font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;letter-spacing:0.1em;}
.badge-hit{background:rgba(255,102,0,0.2);color:var(--orange);border:1px solid rgba(255,102,0,0.4);}
.badge-new{background:rgba(51,255,102,0.15);color:#33ff66;border:1px solid rgba(51,255,102,0.3);}
.badge-sale{background:rgba(255,51,51,0.15);color:#ff3333;border:1px solid rgba(255,51,51,0.3);}
.product-category{font-family:'Space Mono',monospace;font-size:10px;color:var(--gray);letter-spacing:0.1em;margin-bottom:6px;}
.product-name{font-family:'Orbitron',monospace;font-size:13px;color:var(--white);margin-bottom:10px;line-height:1.4;}
.product-price-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.product-price{font-family:'Orbitron',monospace;font-size:20px;color:var(--orange);font-weight:900;}
.product-old-price{font-size:13px;color:var(--gray);text-decoration:line-through;}
.product-btn{width:100%;background:var(--orange-dim);border:1px solid var(--orange);color:var(--orange);padding:10px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;}
.product-btn:hover{background:var(--orange);color:#000;}
.no-products{text-align:center;padding:80px 20px;color:var(--gray);font-family:'Space Mono',monospace;}
.no-products div{font-size:60px;margin-bottom:20px;}
.loading{text-align:center;padding:80px;color:var(--gray);font-family:'Space Mono',monospace;font-size:13px;}

/* CART MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:none;align-items:flex-start;justify-content:flex-end;}
.modal-overlay.open{display:flex;}
.cart-panel{background:var(--dark);border-left:1px solid var(--border);width:420px;max-width:100vw;height:100vh;overflow-y:auto;padding:32px;display:flex;flex-direction:column;gap:20px;}
.cart-panel-header{display:flex;justify-content:space-between;align-items:center;}
.cart-panel-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;}
.close-btn{background:transparent;border:1px solid var(--border);color:var(--gray);width:36px;height:36px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.close-btn:hover{border-color:var(--orange);color:var(--orange);}
.cart-items{flex:1;display:flex;flex-direction:column;gap:12px;}
.cart-item{background:var(--card);border:1px solid var(--border);padding:14px;display:flex;gap:14px;align-items:center;}
.cart-item-img{width:60px;height:60px;background:var(--dark);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden;}
.cart-item-img img{width:100%;height:100%;object-fit:cover;}
.cart-item-info{flex:1;}
.cart-item-name{font-family:'Orbitron',monospace;font-size:12px;color:var(--white);margin-bottom:4px;}
.cart-item-price{font-size:13px;color:var(--orange);font-family:'Space Mono',monospace;}
.cart-item-qty{display:flex;align-items:center;gap:8px;margin-top:6px;}
.qty-btn{background:var(--border);border:none;color:var(--white);width:24px;height:24px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.qty-btn:hover{background:var(--orange);}
.qty-num{font-family:'Space Mono',monospace;font-size:12px;color:var(--white);}
.cart-remove{background:transparent;border:none;color:var(--gray);cursor:pointer;font-size:18px;padding:4px;transition:color 0.2s;}
.cart-remove:hover{color:var(--red);}
.cart-total{background:var(--card);border:1px solid var(--border);padding:20px;}
.cart-total-row{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:13px;color:var(--gray);margin-bottom:8px;}
.cart-total-sum{font-family:'Orbitron',monospace;font-size:24px;color:var(--orange);font-weight:900;}
.cart-empty{text-align:center;padding:40px;color:var(--gray);font-family:'Space Mono',monospace;font-size:13px;}
.cart-actions{display:flex;flex-direction:column;gap:10px;}
.cart-back-btn{background:transparent;border:1px solid var(--border);color:var(--gray);padding:14px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s;width:100%;}
.cart-back-btn:hover{border-color:var(--orange);color:var(--orange);}
.cart-checkout-btn{background:var(--orange);color:#000;border:none;padding:14px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;width:100%;}
.cart-checkout-btn:hover{background:var(--orange-glow);}

/* ORDER MODAL */
.order-modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px;}
.order-modal.open{display:flex;}
.order-box{background:var(--dark);border:1px solid var(--border);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:40px;display:flex;flex-direction:column;gap:14px;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.order-box-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:var(--orange);}
.order-box-sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--gray);margin-bottom:4px;}
.form-input{background:var(--card);border:1px solid var(--border);color:var(--white);padding:12px 14px;font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;width:100%;}
.form-input:focus{border-color:var(--orange);}
.order-divider{border:none;border-top:1px solid var(--border);margin:4px 0;}
.order-btn{background:var(--orange);color:#000;border:none;padding:14px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;width:100%;}
.order-btn:hover{background:var(--orange-glow);}
.order-btn:disabled{opacity:0.5;cursor:not-allowed;}
.order-back-btn{background:transparent;border:1px solid var(--border);color:var(--gray);padding:12px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s;width:100%;}
.order-back-btn:hover{border-color:var(--orange);color:var(--orange);}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--orange);color:var(--white);padding:14px 28px;font-family:'Space Mono',monospace;font-size:13px;z-index:9999;transition:transform 0.3s;opacity:0;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">🐧 LINUX<span>SHOP</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Головна</a></li>
    <li><a href="index.html#delivery">Доставка</a></li>
    <li><a href="index.html#contacts">Контакти</a></li>
  </ul>
  <button class="cart-btn" onclick="openCart()">🛒 КОШИК <span class="cart-count" id="cartCount">0</span></button>
</nav>

<div class="page-wrap">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">// ФІЛЬТРИ</div>

    <div class="filter-group">
      <span class="filter-label">ТИП ТОВАРУ</span>
      <button class="filter-btn active" onclick="setFilter('all',this)">Всі товари</button>
      <button class="filter-btn" onclick="setFilter('hit',this)">⭐ Хіти продажів</button>
      <button class="filter-btn" onclick="setFilter('new',this)">🆕 Новинки</button>
      <button class="filter-btn" onclick="setFilter('sale',this)">🔥 Акції</button>
    </div>

    <div class="filter-group">
      <span class="filter-label">КАТЕГОРІЯ</span>
      <button class="filter-btn" onclick="setCat('',this)">Всі категорії</button>
      <button class="filter-btn" onclick="setCat('tshirts',this)">👕 Футболки</button>
      <button class="filter-btn" onclick="setCat('hoodies',this)">🧥 Худі</button>
      <button class="filter-btn" onclick="setCat('caps',this)">🧢 Кепки</button>
      <button class="filter-btn" onclick="setCat('mugs',this)">☕ Кружки</button>
      <button class="filter-btn" onclick="setCat('stickers',this)">🏷️ Стікери</button>
      <button class="filter-btn" onclick="setCat('accessories',this)">🎒 Аксесуари</button>
    </div>

    <div class="filter-group">
      <span class="filter-label">ЦІНА (ГРН)</span>
      <div class="price-inputs">
        <input class="price-input" type="number" id="priceMin" placeholder="Від" min="0">
        <span style="color:var(--gray)">—</span>
        <input class="price-input" type="number" id="priceMax" placeholder="До" min="0">
      </div>
      <button class="apply-btn" onclick="applyPriceFilter()">ЗАСТОСУВАТИ</button>
      <button class="apply-btn" style="margin-top:6px;background:transparent;border-color:var(--border);color:var(--gray)" onclick="clearPriceFilter()">СКИНУТИ</button>
    </div>

    <div class="filter-group">
      <span class="filter-label">СОРТУВАННЯ</span>
      <select class="sort-select" id="sortSelect" onchange="renderProducts()" style="width:100%">
        <option value="default">За замовчуванням</option>
        <option value="price_asc">Ціна: зростання</option>
        <option value="price_desc">Ціна: спадання</option>
        <option value="name_asc">Назва А-Я</option>
      </select>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="catalog-header">
      <div>
        <h1 class="catalog-title">КАТАЛОГ</h1>
        <p class="catalog-meta" id="catalogMeta">Завантаження...</p>
      </div>
      <div class="search-sort">
        <input class="search-input" type="text" id="searchInput" placeholder="🔍 Пошук товарів..." oninput="renderProducts()">
      </div>
    </div>
    <div class="products-grid" id="productsGrid">
      <div class="loading">⏳ Завантаження товарів з бази даних...</div>
    </div>
  </main>
</div>

<!-- CART MODAL -->
<div class="modal-overlay" id="cartModal" onclick="closeCartOutside(event)">
  <div class="cart-panel">
    <div class="cart-panel-header">
      <div class="cart-panel-title">🛒 КОШИК</div>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total" id="cartTotal" style="display:none">
      <div class="cart-total-row"><span>Разом:</span><span class="cart-total-sum" id="cartTotalSum">0 грн</span></div>
    </div>
    <div class="cart-actions" id="cartActions" style="display:none">
      <button class="cart-back-btn" onclick="closeCart()">← ПОВЕРНУТИСЬ ДО ПОКУПОК</button>
      <button class="cart-checkout-btn" onclick="openOrderModal()">ПЕРЕЙТИ ДО ЗАМОВЛЕННЯ →</button>
    </div>
  </div>
</div>

<!-- ORDER MODAL -->
<div class="order-modal" id="orderModal">
  <div class="order-box">
    <div class="order-box-title">ОФОРМЛЕННЯ ЗАМОВЛЕННЯ</div>
    <div class="order-box-sub">// Заповніть дані для доставки</div>
    <input class="form-input" type="text" id="o-name" placeholder="Ваше ім'я *">
    <input class="form-input" type="tel" id="o-phone" placeholder="Телефон *">
    <input class="form-input" type="email" id="o-email" placeholder="Email">
    <input class="form-input" type="text" id="o-city" placeholder="Місто *">
    <input class="form-input" type="text" id="o-branch" placeholder="Відділення Нової Пошти *">
    <hr class="order-divider">
    <input class="form-input" type="text" id="o-promo" placeholder="Промокод (необов'язково)">
    <button class="order-btn" id="orderBtn" onclick="submitOrder()">✅ ПІДТВЕРДИТИ ЗАМОВЛЕННЯ</button>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDSFdSjNQNDxAU_QgvzhEpGDyxbo8apfTE",
    authDomain: "linux-shop-b5b3e.firebaseapp.com",
    projectId: "linux-shop-b5b3e",
    storageBucket: "linux-shop-b5b3e.firebasestorage.app",
    messagingSenderId: "889010336562",
    appId: "1:889010336562:web:2f60090b33fa29c0ed5d2b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db;

  // Load all products once
  async function loadProducts() {
    try {
      const snap = await getDocs(collection(db, 'products'));
      window._allProducts = [];
      snap.forEach(doc => window._allProducts.push({id: doc.id, ...doc.data()}));
      renderProducts();
    } catch(e) {
      document.getElementById('productsGrid').innerHTML = '<div class="loading">❌ Помилка завантаження. Перевірте Firestore.</div>';
    }
  }

  // Submit order to Firestore
  window.submitOrderToDB = async function(orderData) {
    await addDoc(collection(db, 'orders'), {
      ...orderData,
      createdAt: serverTimestamp(),
      status: 'new'
    });
  };

  // Check URL params for initial filter
  const urlParams = new URLSearchParams(window.location.search);
  const initFilter = urlParams.get('filter') || 'all';
  const initCat = urlParams.get('cat') || '';
  window._activeFilter = initFilter;
  window._activeCat = initCat;
  window._priceMin = null;
  window._priceMax = null;

  // Highlight correct filter button
  if (initFilter !== 'all') {
    document.querySelectorAll('.sidebar .filter-group:first-of-type .filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sidebar .filter-group:first-of-type .filter-btn').forEach(btn => {
      if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes("'"+initFilter+"'")) {
        btn.classList.add('active');
      }
    });
  }
  if (initCat) {
    document.querySelectorAll('.sidebar .filter-group:nth-of-type(2) .filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sidebar .filter-group:nth-of-type(2) .filter-btn').forEach(btn => {
      if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes("'"+initCat+"'")) {
        btn.classList.add('active');
      }
    });
  }

  loadProducts();
</script>

<script>
window._allProducts = window._allProducts || [];
window._activeFilter = window._activeFilter || 'all';
window._activeCat = window._activeCat || '';
window._priceMin = null;
window._priceMax = null;

function setFilter(f, btn) {
  window._activeFilter = f;
  document.querySelectorAll('.sidebar .filter-group:first-of-type .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function setCat(c, btn) {
  window._activeCat = c;
  document.querySelectorAll('.sidebar .filter-group:nth-of-type(2) .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function applyPriceFilter() {
  window._priceMin = parseFloat(document.getElementById('priceMin').value) || null;
  window._priceMax = parseFloat(document.getElementById('priceMax').value) || null;
  renderProducts();
}

function clearPriceFilter() {
  window._priceMin = null;
  window._priceMax = null;
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  renderProducts();
}

function renderProducts() {
  const products = window._allProducts || [];
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const filter = window._activeFilter;
  const cat = window._activeCat;
  const pMin = window._priceMin;
  const pMax = window._priceMax;

  let filtered = products.filter(p => {
    if (filter === 'hit' && !p.isHit) return false;
    if (filter === 'new' && !p.isNew) return false;
    if (filter === 'sale' && !p.isSale) return false;
    if (cat && p.category !== cat) return false;
    if (pMin !== null && p.price < pMin) return false;
    if (pMax !== null && p.price > pMax) return false;
    if (search && !p.name.toLowerCase().includes(search) && !(p.description||'').toLowerCase().includes(search)) return false;
    return true;
  });

  if (sort === 'price_asc') filtered.sort((a,b) => a.price - b.price);
  else if (sort === 'price_desc') filtered.sort((a,b) => b.price - a.price);
  else if (sort === 'name_asc') filtered.sort((a,b) => a.name.localeCompare(b.name));

  const grid = document.getElementById('productsGrid');
  document.getElementById('catalogMeta').textContent = `Знайдено: ${filtered.length} товарів`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-products" style="grid-column:1/-1"><div>🔍</div><p>Товарів не знайдено</p><p style="font-size:11px;margin-top:8px">Спробуйте змінити фільтри або пошук</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const badges = [
      p.isHit ? '<span class="badge badge-hit">ХІТ</span>' : '',
      p.isNew ? '<span class="badge badge-new">НОВИНКА</span>' : '',
      p.isSale ? '<span class="badge badge-sale">АКЦІЯ</span>' : ''
    ].join('');
    const oldPrice = p.isSale && p.oldPrice ? `<span class="product-old-price">${p.oldPrice} грн</span>` : '';
    const catNames = {tshirts:'Футболки',hoodies:'Худі',caps:'Кепки',mugs:'Кружки',stickers:'Стікери',accessories:'Аксесуари'};
    const catLabel = catNames[p.category] || p.category || '';
    const imgHtml = p.photo
      ? `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;">`
      : (p.emoji || '📦');
    const safePhoto = (p.photo||'').replace(/'/g,"\\'");
    return `<div class="product-card">
      <div class="product-img">${imgHtml}</div>
      <div class="product-info">
        <div class="product-badges">${badges}</div>
        ${catLabel ? `<div class="product-category">${catLabel}</div>` : ''}
        <div class="product-name">${p.name}</div>
        <div class="product-price-row">
          <span class="product-price">${p.price} грн</span>${oldPrice}
        </div>
        <button class="product-btn" onclick="addToCart('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.emoji||'📦'}','${safePhoto}')">В КОШИК</button>
      </div>
    </div>`;
  }).join('');
}

// CART
function addToCart(id, name, price, emoji, photo) {
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const idx = cart.findIndex(i => i.id === id);
  if (idx >= 0) cart[idx].qty++;
  else cart.push({id, name, price, emoji, photo: photo||'', qty: 1});
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  showToast('✅ Додано: ' + name);
}

function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  document.getElementById('cartCount').textContent = cart.reduce((s,i) => s + i.qty, 0);
}

function openCart() {
  document.getElementById('cartModal').classList.add('open');
  renderCart();
}

function closeCart() {
  document.getElementById('cartModal').classList.remove('open');
}

function closeCartOutside(e) {
  if (e.target === document.getElementById('cartModal')) closeCart();
}

function openOrderModal() {
  document.getElementById('cartModal').classList.remove('open');
  document.getElementById('orderModal').classList.add('open');
}

function closeOrderModal() {
  document.getElementById('orderModal').classList.remove('open');
  document.getElementById('cartModal').classList.add('open');
  renderCart();
}

function renderCart() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const items = document.getElementById('cartItems');
  const total = document.getElementById('cartTotal');
  const actions = document.getElementById('cartActions');

  if (cart.length === 0) {
    items.innerHTML = '<div class="cart-empty">🛒 Кошик порожній<br><br>Додайте товари з каталогу</div>';
    total.style.display = 'none';
    actions.style.display = 'none';
    return;
  }

  items.innerHTML = cart.map((item, i) => `
    <div class="cart-item">
      <div class="cart-item-img">${item.photo ? `<img src="${item.photo}" alt="">` : `<span style="font-size:28px">${item.emoji||'📦'}</span>`}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${item.price * item.qty} грн</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
      <button class="cart-remove" onclick="removeItem(${i})">✕</button>
    </div>`).join('');

  document.getElementById('cartTotalSum').textContent = cart.reduce((s,i) => s + i.price * i.qty, 0) + ' грн';
  total.style.display = 'block';
  actions.style.display = 'flex';
}

function changeQty(idx, delta) {
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  renderCart();
}

function removeItem(idx) {
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  cart.splice(idx, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  renderCart();
}

async function submitOrder() {
  const name = document.getElementById('o-name').value.trim();
  const phone = document.getElementById('o-phone').value.trim();
  const city = document.getElementById('o-city').value.trim();
  const branch = document.getElementById('o-branch').value.trim();
  if (!name || !phone || !city || !branch) { showToast('❌ Заповніть всі обов\'язкові поля'); return; }
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  if (!cart.length) { showToast('❌ Кошик порожній'); return; }

  const btn = document.getElementById('orderBtn');
  btn.disabled = true; btn.textContent = 'ОФОРМЛЕННЯ...';

  const orderData = {
    customer: { name, phone, email: document.getElementById('o-email').value.trim(), city, branch, promo: document.getElementById('o-promo').value.trim() },
    items: cart.map(i => ({id:i.id, name:i.name, price:i.price, emoji:i.emoji||'📦', qty:i.qty})),
    total: cart.reduce((s,i) => s + i.price * i.qty, 0),
    status: 'new'
  };

  try {
    await window.submitOrderToDB(orderData);
    localStorage.removeItem('cart');
    updateCartCount();
    document.getElementById('orderModal').classList.remove('open');
    showToast('✅ Замовлення оформлено! Дякуємо, ' + name + '!');
  } catch(e) {
    showToast('❌ Помилка. Спробуйте ще раз.');
  }
  btn.disabled = false; btn.textContent = '✅ ПІДТВЕРДИТИ ЗАМОВЛЕННЯ';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

updateCartCount();
</script>
